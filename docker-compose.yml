services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_mini_project
    ports:
      - "27016:27017"
    volumes:
      - mongo_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]

  redis:
    image: redis:latest
    container_name: redis_mini_project
    ports:
      - "6379:6379"

volumes:
  mongo_data: